## Render deployment configuration
## Deploy via: render.com → New → Blueprint → point to this repo.

services:
  # ── Orchestrator ─────────────────────────────────────────────────────────
  - type: web
    name: hvac-orchestrator
    runtime: python
    region: ohio           # us-east-2 — closest to Toronto
    plan: starter
    buildCommand: pip install -r apps/orchestrator/requirements.txt
    startCommand: >
      uvicorn apps.orchestrator.main:app
      --host 0.0.0.0
      --port $PORT
      --workers 1
    envVars:
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: MCP_SERVER_URL
        fromService:
          name: hvac-mcp-server
          type: web
          property: host
          # Will be set as https://hvac-mcp-server.onrender.com

  # ── MCP Server ───────────────────────────────────────────────────────────
  - type: web
    name: hvac-mcp-server
    runtime: python
    region: ohio
    plan: starter
    buildCommand: pip install -r apps/mcp_server/requirements.txt
    startCommand: >
      python -m apps.mcp_server.main
    envVars:
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: ENVIRONMENT
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
